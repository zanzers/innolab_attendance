name: innolab_attendace
description: "innolab amcen attendance"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2

  

  # UTILITY PACKAGES
  http: ^1.6.0
  intl: ^0.20.2
  logger: ^1.1.0
  url_launcher: ^6.1.7
  html: ^0.15.6

  # ICONS
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.8

  # STATE MANAGEMENT
  get: ^4.7.3
  get_storage: ^2.0.3

  # UI / PRODUCT PACKAGES
  google_fonts: ^8.0.2
  provider: ^6.0.5
  signature: ^6.3.0
  firebase_core: ^4.6.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:                              # ← must be 2 spaces under flutter:
    - assets/images/wpu_logo.jpg
    - assets/images/wpu_campus.png
    - assets/icons/
